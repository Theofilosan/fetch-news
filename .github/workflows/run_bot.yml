name: Run Discord Bot

on:
  schedule:
    - cron: '0 * * * *'  # Runs automatically every single hour
  workflow_dispatch:      # Allows manual execution via button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests feedparser

    - name: Run Bot Script
      env:
        SPORT24_WEBHOOK: ${{ secrets.SPORT24_WEBHOOK }}
        NEWS247_WEBHOOK: ${{ secrets.NEWS247_WEBHOOK }}
        PAOKTODAY_WEBHOOK: ${{ secrets.PAOKTODAY_WEBHOOK }}
        REUTERS_WEBHOOK: ${{ secrets.REUTERS_WEBHOOK }}
        WEATHER_WEBHOOK: ${{ secrets.WEATHER_WEBHOOK }}
      run: python fetch_news.py

    - name: Save Memory (Commit changes)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add sent_articles.txt weather_sent.txt || true
        git commit -m "Update bot memory [skip ci]" || true
        git push || true